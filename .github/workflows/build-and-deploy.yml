name: Build CoratiaOS Flashable Image

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual trigger

env:
  DOCKER_REPO: adarshnemesis/coratiaos-core

jobs:
  # ── Step 1: Build Frontend ──
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        run: cd core/frontend && npm ci

      - name: Build frontend
        run: cd core/frontend && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: core/frontend/dist

  # ── Step 2: Build Docker Image (ARM) ──
  build-docker:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: core/frontend/dist

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Login to Docker Hub (only on push, and only if secrets are set)
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request' && secrets.DOCKER_USERNAME != ''
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push multi-arch image
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: core/Dockerfile
          platforms: linux/arm/v7
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.DOCKER_REPO }}:${{ github.sha }}
            ${{ env.DOCKER_REPO }}:latest
          outputs: type=docker,dest=/tmp/coratiaos-core.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/coratiaos-core.tar

  # ── Step 3: Build Flashable Raspberry Pi Image ──
  build-pi-image:
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp/

      # Copy Docker image tar into build context so Pifile can load it
      - name: Prepare Docker image for embedding
        run: |
          mkdir -p build/docker-image
          cp /tmp/coratiaos-core.tar build/docker-image/

      - name: Install pimod dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binfmt-support \
            kpartx \
            qemu-user-static \
            parted \
            zerofree \
            wget \
            xz-utils \
            unzip

      - name: Clone pimod
        run: git clone --depth 1 https://github.com/Nature40/pimod.git /tmp/pimod

      - name: Build CoratiaOS image
        run: |
          cd ${{ github.workspace }}
          sudo /tmp/pimod/pimod.sh build/coratiaos.Pifile

      - name: Compress image to zip
        run: |
          IMG_FILE=$(ls *.img 2>/dev/null || ls build/*.img 2>/dev/null)
          VERSION="${GITHUB_REF_NAME:-dev}"
          ZIP_NAME="CoratiaOS-${VERSION}-$(date +%Y%m%d).zip"
          zip -9 "${ZIP_NAME}" "${IMG_FILE}"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload flashable image
        uses: actions/upload-artifact@v4
        with:
          name: coratiaos-flashable-image
          path: CoratiaOS-*.zip
          retention-days: 30

      # Create release on tag push
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: CoratiaOS-*.zip
          body: |
            ## CoratiaOS ${{ github.ref_name }}

            Flash this image to your Raspberry Pi 4 SD card and connect to `http://192.168.2.2`.

            **Default credentials:**
            - SSH: `pi` / `coratiaos`
            - Dashboard: `http://192.168.2.2`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
