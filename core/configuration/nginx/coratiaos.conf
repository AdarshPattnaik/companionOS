# ============================================================
# CoratiaOS — Nginx Reverse Proxy Configuration
# All services proxied through port 80
# ============================================================

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 100M;

    # Frontend (Static files)
    location / {
        root /home/coratiaos/frontend;
        try_files $uri $uri/ /index.html;
    }

    # Ardupilot Manager
    location /ardupilot-manager/ {
        rewrite ^/ardupilot-manager(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Commander
    location /commander/ {
        rewrite ^/commander(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:6010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Video Manager
    location /video/ {
        rewrite ^/video(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:6020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # NMEA Injector
    location /nmea-injector/ {
        rewrite ^/nmea-injector(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:6030;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # System Helper
    location /helper/ {
        rewrite ^/helper(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:6040;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # WiFi Manager
    location /wifi-manager/ {
        rewrite ^/wifi-manager(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:6050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Log Manager
    location /log-manager/ {
        rewrite ^/log-manager(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:6065;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # File Browser
    location /file-browser/ {
        rewrite ^/file-browser(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:7070;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Version Chooser
    location /version-chooser/ {
        rewrite ^/version-chooser(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Cable Guy (Ethernet/Network)
    location /cable-guy/ {
        rewrite ^/cable-guy(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Kraken (Extension Manager)
    location /kraken/ {
        rewrite ^/kraken(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:9134;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Web Terminal
    location /terminal/ {
        rewrite ^/terminal(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
